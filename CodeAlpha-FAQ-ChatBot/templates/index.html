<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha Assistant</title>
    <!-- Link to custom CSS for dark modern theme -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Load FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <!-- Chatbot Header -->
        <header class="chat-header">
            <div class="header-info">
                <div class="bot-avatar">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div class="header-text">
                    <h1>CodeAlpha Assistant</h1>
                    <p>Ask anything about CodeAlpha</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" title="Options"><i class="fa-solid fa-ellipsis-vertical"></i></button>
            </div>
        </header>

        <!-- Chat Area for messages -->
        <main class="chat-box" id="chat-box">
            <!-- Initial greeting message from bot -->
            <div class="message bot-message">
                <div class="message-content">
                    <p>Hello! I am the CodeAlpha Assistant. How can I help you today?</p>
                </div>
                <div class="message-time" id="initial-time"></div>
            </div>
        </main>

        <!-- Input Area for user typing -->
        <footer class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
                <button id="send-btn" class="send-btn">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </footer>

        <!-- Developer Credit -->
        <div class="developer-credit">Developer: Asim Taseer</div>
    </div>

    <!-- Link to custom JavaScript -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
